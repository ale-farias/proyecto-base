<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Mi Negocio</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
</head>
<body>
    <!-- Botón de tema flotante -->
    <button id="theme-toggle" class="theme-toggle" onclick="App.toggleTheme()" title="Cambiar modo" aria-label="Cambiar modo oscuro/claro" style="position: fixed; top: 16px; right: 16px; z-index: 9999;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-titulo">Crear Cuenta</h1>
            <p class="auth-subtitulo">Regístrate para reservar tus turnos online</p>

            <form id="register-form">
                <div class="form-grupo">
                    <label class="form-label" for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" class="form-input" placeholder="Juan Pérez" autocomplete="name" required>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="tu@email.com" required>
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="telefono">Teléfono (opcional)</label>
                    <input type="tel" id="telefono" name="telefono" class="form-input" placeholder="+54 11 1234-5678">
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
                </div>

                <div class="form-grupo">
                    <label class="form-label" for="password-confirm">Confirmar Contraseña</label>
                    <input type="password" id="password-confirm" name="password-confirm" class="form-input" placeholder="••••••••" autocomplete="new-password" required>
                </div>

                <div id="error-message" class="form-error oculto"></div>

                <button type="submit" class="btn btn-primario" style="width: 100%;">
                    Crear Cuenta
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="/static/login.html">Inicia sesión aquí</a></p>
                <p><a href="/static/index.html">← Volver al inicio</a></p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            App.initTheme();
            setTimeout(() => App.renderThemeButton(), 100);
        });
        
        // Verificar si ya está logueado
        if (App.isLoggedIn()) {
            const user = App.getUsuario();
            if (user.rol === 'admin') {
                window.location.href = '/static/admin.html';
            } else {
                window.location.href = '/static/dashboard.html';
            }
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const errorDiv = document.getElementById('error-message');
            const btn = e.target.querySelector('button[type="submit"]');

            // Validaciones
            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Las contraseñas no coinciden';
                errorDiv.classList.remove('oculto');
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.classList.remove('oculto');
                return;
            }

            errorDiv.classList.add('oculto');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';

            try {
                await App.register(nombre, email, password, telefono);
                window.location.href = '/static/dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('oculto');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Crear Cuenta';
            }
        });
    </script>
</body>
</html>
