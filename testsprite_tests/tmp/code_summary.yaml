version: "2"
type: frontend
tech_stack:
  - Python
  - Flask
  - Vanilla JavaScript
  - SQLite
routes:
  - path: /static/index.html
    file: static/index.html
    auth_required: false
    description: Home page with services, testimonials, FAQ
  - path: /static/login.html
    file: static/login.html
    auth_required: false
    description: User login page
  - path: /static/register.html
    file: static/register.html
    auth_required: false
    description: User registration page
  - path: /static/dashboard.html
    file: static/dashboard.html
    auth_required: true
    description: User dashboard with bookings
  - path: /static/admin.html
    file: static/admin.html
    auth_required: true
    admin_only: true
    description: Admin dashboard
features:
  - name: User Login
    description: Login with email and password
    files:
      - static/login.html
      - static/js/app.js
    user_interactions:
      - Fill email field
      - Fill password field
      - Click Login button
      - See error on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: User Registration
    description: Register new user account
    files:
      - static/register.html
      - static/js/app.js
    user_interactions:
      - Fill name field
      - Fill email field
      - Fill phone field
      - Fill password field
      - Fill confirm password
      - Click Register button
      - See success and redirect to dashboard
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Dark Mode Toggle
    description: Toggle between light and dark theme
    files:
      - static/js/app.js
    user_interactions:
      - Click theme toggle button
      - See theme change
    auth_required: false
  - name: Booking Flow
    description: Create new appointment reservation
    files:
      - static/dashboard.html
      - static/js/app.js
    user_interactions:
      - Click Reservar Turno
      - Select service card
      - Select date from picker
      - Select time slot
      - Click Confirmar Reserva
      - See success message
      - See new booking in Mis Turnos
    api_calls:
      - method: GET
        endpoint: /api/servicios
      - method: GET
        endpoint: /api/turnos/disponibles
      - method: POST
        endpoint: /api/turnos
    auth_required: true
  - name: View Services
    description: View available services on home page
    files:
      - static/index.html
    user_interactions:
      - Scroll to servicios section
      - See service cards with name, price, duration
    api_calls:
      - method: GET
        endpoint: /api/servicios
    auth_required: false
  - name: Menu Responsive
    description: Mobile navigation menu
    files:
      - static/css/styles.css
    user_interactions:
      - Click hamburger menu on mobile
      - See menu open/close
    auth_required: false
known_limitations: []